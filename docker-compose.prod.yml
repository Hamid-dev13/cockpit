# Environnement de PRODUCTION local (build optimise) avec Postgres inclus.
#   make prod-up   -> build + demarre en arriere-plan
#   make prod-down -> arrete
#
# NOTE: sur Coolify, on utilise le build pack Dockerfile + une base Postgres
# managee (creee dans Coolify), pas ce compose. Ce fichier sert au prod local.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
      POSTGRES_DB: cockpit
    volumes:
      - cockpit-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cockpit']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
    container_name: cockpit-prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: 'postgresql://cockpit:cockpit@db:5432/cockpit?schema=public'
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
    env_file:
      - .env.local
    restart: unless-stopped

volumes:
  cockpit-pgdata:
