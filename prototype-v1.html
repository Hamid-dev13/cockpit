<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cockpit — Suivi de candidatures</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: {
          ink: { 950: '#0a0a0f', 900: '#0e0e16', 850: '#13131e', 800: '#181826', 700: '#222234', 600: '#2e2e44' },
          glow: { DEFAULT: '#7c6cff', soft: '#a99dff' },
        },
        keyframes: {
          slidein: { '0%': { transform: 'translateX(100%)', opacity: 0 }, '100%': { transform: 'translateX(0)', opacity: 1 } },
          fadein: { '0%': { opacity: 0, transform: 'translateY(6px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          pulseGlow: { '0%,100%': { opacity: 0.5 }, '50%': { opacity: 1 } },
        },
        animation: {
          slidein: 'slidein .28s cubic-bezier(.2,.8,.2,1)',
          fadein: 'fadein .35s ease both',
          pulseGlow: 'pulseGlow 2.4s ease-in-out infinite',
        },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #2e2e44; border-radius: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  body { background: radial-gradient(1200px 600px at 80% -10%, rgba(124,108,255,.10), transparent 60%), #0a0a0f; }
  .glass { background: rgba(20,20,30,.72); backdrop-filter: blur(14px); }
  .ring-glow { box-shadow: 0 0 0 1px rgba(124,108,255,.35), 0 8px 40px -8px rgba(124,108,255,.35); }
  .momentum { background: linear-gradient(90deg, var(--c1), var(--c2)); }
  [contenteditable]:empty:before { content: attr(data-ph); color: #5a5a72; }
  .row-hover:hover { background: linear-gradient(90deg, rgba(124,108,255,.07), transparent); }
</style>
</head>
<body class="text-zinc-200 font-sans antialiased overflow-hidden">

<div id="app" class="h-screen flex flex-col"></div>

<!-- Slide-over panel -->
<div id="panel-root"></div>
<!-- Command bar / Copilot -->
<div id="cmd-root"></div>
<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none"></div>

<script>
// ────────────────────────────────────────────────────────────────────────────
//  COCKPIT — prototype mono-fichier. Données fictives + persistance localStorage.
//  Les fonctions IA (aiExtract / aiReply / aiDraft) sont SIMULÉES côté client.
//  → Pour brancher la vraie API Claude, voir les blocs marqués  // 🔌 CLAUDE
// ────────────────────────────────────────────────────────────────────────────

const STATUSES = {
  wishlist:  { label: 'Wishlist',  dot: '#8b8ba7', tint: 'rgba(139,139,167,.15)' },
  applied:   { label: 'Postulé',   dot: '#5b9bff', tint: 'rgba(91,155,255,.15)' },
  interview: { label: 'Entretien', dot: '#34d399', tint: 'rgba(52,211,153,.15)' },
  offer:     { label: 'Offre',     dot: '#fbbf24', tint: 'rgba(251,191,36,.15)' },
  rejected:  { label: 'Refusé',    dot: '#f87171', tint: 'rgba(248,113,113,.13)' },
};
const ORDER = ['wishlist','applied','interview','offer','rejected'];

const DAY = 86400000;
const now = () => Date.now();
const daysAgo = n => now() - n * DAY;

const SEED = [
  { id: 1, company: 'Stripe',  role: 'Senior Frontend Engineer', status: 'interview', salary: '75–90k€', stack: ['React','TypeScript','GraphQL'], location: 'Remote', url: 'https://stripe.com/jobs', last: daysAgo(1),  next: { label: 'Entretien tech', at: daysAgo(-2) }, comments: [{t: daysAgo(1), txt:'Call RH ok, ils enchaînent sur un tech.'}] },
  { id: 2, company: 'Datadog', role: 'Fullstack Engineer',       status: 'applied',   salary: '65–80k€', stack: ['Go','React','K8s'],        location: 'Paris',  url: '', last: daysAgo(8),  next: null, comments: [{t: daysAgo(8), txt:'Candidature envoyée via leur site.'}] },
  { id: 3, company: 'Figma',   role: 'Product Engineer',         status: 'wishlist',  salary: '—',       stack: ['TypeScript','WebGL'],     location: 'Remote', url: '', last: daysAgo(3),  next: null, comments: [] },
  { id: 4, company: 'Notion',  role: 'Frontend Engineer',        status: 'rejected',  salary: '60–75k€', stack: ['React','Rust'],           location: 'Paris',  url: '', last: daysAgo(12), next: null, comments: [{t: daysAgo(12), txt:'Refus après le screening. Pas assez d\'XP Rust.'}] },
  { id: 5, company: 'Vercel',  role: 'DX Engineer',              status: 'applied',   salary: '70–85k€', stack: ['Next.js','Node'],         location: 'Remote', url: '', last: daysAgo(5),  next: null, comments: [] },
];

let state = load();
function load() {
  try { const s = JSON.parse(localStorage.getItem('cockpit')); if (s && s.length) return s; } catch(e){}
  return SEED;
}
function save() { localStorage.setItem('cockpit', JSON.stringify(state)); }

// ── Momentum : chaleur basée sur les jours d'inactivité ─────────────────────
function momentum(c) {
  if (c.status === 'rejected' || c.status === 'offer') return null;
  const d = Math.floor((now() - c.last) / DAY);
  if (d <= 2)  return { pct: 100, c1:'#34d399', c2:'#22d3ee', label:`Frais · J+${d}`, risk:'ok' };
  if (d <= 5)  return { pct: 70,  c1:'#fbbf24', c2:'#34d399', label:`Tiède · J+${d}`, risk:'warm' };
  if (d <= 9)  return { pct: 40,  c1:'#fb923c', c2:'#fbbf24', label:`Refroidit · J+${d}`, risk:'cool' };
  return { pct: 15, c1:'#f87171', c2:'#fb923c', label:`Ghosting · J+${d}`, risk:'cold' };
}

let filter = { status: 'all', q: '' };

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const list = state
    .filter(c => filter.status === 'all' || c.status === filter.status)
    .filter(c => !filter.q || (c.company + ' ' + c.role).toLowerCase().includes(filter.q.toLowerCase()))
    .sort((a,b) => ORDER.indexOf(a.status) - ORDER.indexOf(b.status) || a.last - b.last);

  const stale = state.filter(c => { const m = momentum(c); return m && (m.risk==='cool'||m.risk==='cold'); });
  const counts = ORDER.map(s => ({ s, n: state.filter(c=>c.status===s).length }));

  app.innerHTML = `
    <header class="flex items-center gap-4 px-6 h-16 border-b border-ink-700/60 shrink-0">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-glow to-indigo-500 grid place-items-center text-sm font-bold shadow-lg shadow-glow/30">C</div>
        <div class="font-bold tracking-tight">Cockpit</div>
        <span class="text-[11px] text-zinc-500 px-1.5 py-0.5 rounded bg-ink-800 border border-ink-700">perso</span>
      </div>
      <button onclick="openCmd()" class="ml-2 group flex items-center gap-2 text-sm text-zinc-400 hover:text-zinc-200 bg-ink-850 hover:bg-ink-800 border border-ink-700 rounded-lg px-3 h-9 transition w-72">
        <svg class="w-4 h-4 text-glow-soft" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 2 1 3 1 5h12c0-2 1-3 1-5a7 7 0 0 0-7-7Z"/><path d="M9 19h6M10 22h4"/></svg>
        <span class="flex-1 text-left">Demande au copilote…</span>
        <kbd class="text-[10px] bg-ink-700 px-1.5 py-0.5 rounded border border-ink-600">⌘K</kbd>
      </button>
      <div class="flex-1"></div>
      <button onclick="openPaste()" class="flex items-center gap-2 text-sm font-medium bg-glow hover:bg-glow-soft text-white rounded-lg px-3.5 h-9 transition shadow-lg shadow-glow/25">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
        Coller une offre
      </button>
    </header>

    <main class="flex-1 overflow-y-auto px-6 py-6">
      <div class="max-w-5xl mx-auto">

        <!-- ZONE AUJOURD'HUI -->
        <section class="mb-7 animate-fadein">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-[13px] font-semibold text-glow-soft uppercase tracking-wider">Aujourd'hui</span>
            <div class="h-px flex-1 bg-gradient-to-r from-glow/40 to-transparent"></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            ${focusCards(stale).join('')}
          </div>
        </section>

        <!-- STATS / FILTRES -->
        <div class="flex items-center gap-2 mb-3 flex-wrap">
          ${chip('all','Toutes', state.length)}
          ${counts.map(({s,n}) => chip(s, STATUSES[s].label, n)).join('')}
          <div class="flex-1"></div>
          <input id="search" oninput="setQ(this.value)" value="${filter.q}" placeholder="Filtrer…"
            class="bg-ink-850 border border-ink-700 rounded-lg px-3 h-8 text-sm w-44 focus:outline-none focus:ring-glow focus:ring-1 placeholder-zinc-600"/>
        </div>

        <!-- LISTE -->
        <div class="rounded-xl border border-ink-700/70 overflow-hidden bg-ink-900/40">
          ${list.length ? list.map(rowHtml).join('') : `<div class="p-10 text-center text-zinc-500 text-sm">Aucune candidature ici.</div>`}
        </div>

        <div class="mt-4 text-[11px] text-zinc-600 text-center">
          ${state.length} candidatures · ${stale.length} en perte de momentum · prototype design — données fictives
        </div>
      </div>
    </main>
  `;
  const s = document.getElementById('search'); if (s && filter.q) { s.focus(); s.setSelectionRange(filter.q.length, filter.q.length); }
}

function focusCards(stale) {
  const cards = [];
  const interview = state.find(c => c.status === 'interview' && c.next);
  if (interview) cards.push(`
    <button onclick="openPanel(${interview.id})" class="text-left p-4 rounded-xl border border-emerald-500/30 bg-emerald-500/[0.06] hover:bg-emerald-500/[0.1] transition group">
      <div class="flex items-center gap-2 text-emerald-300 text-xs font-semibold mb-1.5">📅 Entretien à préparer</div>
      <div class="font-semibold text-zinc-100">${interview.company} · ${interview.role}</div>
      <div class="text-xs text-zinc-400 mt-1">L'IA peut te générer des questions probables →</div>
    </button>`);
  const ghost = stale[0];
  if (ghost) cards.push(`
    <button onclick="openPanel(${ghost.id})" class="text-left p-4 rounded-xl border border-orange-500/30 bg-orange-500/[0.06] hover:bg-orange-500/[0.1] transition">
      <div class="flex items-center gap-2 text-orange-300 text-xs font-semibold mb-1.5">🔥 Relance recommandée</div>
      <div class="font-semibold text-zinc-100">${ghost.company} · ${ghost.role}</div>
      <div class="text-xs text-zinc-400 mt-1">${momentum(ghost).label} — relance avant que ça refroidisse.</div>
    </button>`);
  cards.push(`
    <button onclick="openCmd()" class="text-left p-4 rounded-xl border border-glow/30 bg-glow/[0.07] hover:bg-glow/[0.12] transition">
      <div class="flex items-center gap-2 text-glow-soft text-xs font-semibold mb-1.5">🤖 Copilote</div>
      <div class="font-semibold text-zinc-100">Demande-moi n'importe quoi</div>
      <div class="text-xs text-zinc-400 mt-1">« Qui je relance ? », « résume mon pipeline »…</div>
    </button>`);
  return cards.slice(0,3);
}

function chip(key, label, n) {
  const active = filter.status === key;
  const dot = STATUSES[key] ? `<span class="w-2 h-2 rounded-full" style="background:${STATUSES[key].dot}"></span>` : '';
  return `<button onclick="setStatus('${key}')" class="flex items-center gap-1.5 text-sm rounded-lg px-2.5 h-8 border transition ${active ? 'bg-ink-700 border-ink-600 text-zinc-100' : 'bg-ink-850 border-ink-700 text-zinc-400 hover:text-zinc-200'}">${dot}${label}<span class="text-[11px] text-zinc-500">${n}</span></button>`;
}

function rowHtml(c) {
  const st = STATUSES[c.status];
  const m = momentum(c);
  return `
    <div class="row-hover group flex items-center gap-3 px-4 py-3 border-b border-ink-700/40 last:border-0 cursor-pointer" onclick="openPanel(${c.id})">
      <button onclick="event.stopPropagation(); cycleStatus(${c.id})" title="Changer le statut"
        class="flex items-center gap-2 shrink-0 w-32 text-sm font-medium rounded-md px-2 py-1 -ml-1" style="background:${st.tint}">
        <span class="w-2 h-2 rounded-full" style="background:${st.dot}"></span>${st.label}
      </button>
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2">
          <span class="font-semibold text-zinc-100 truncate">${c.company}</span>
          <span class="text-zinc-500 truncate">· ${c.role}</span>
        </div>
        <div class="flex items-center gap-2 mt-0.5">
          ${(c.stack||[]).slice(0,3).map(t=>`<span class="text-[10px] text-zinc-400 bg-ink-800 border border-ink-700 rounded px-1.5 py-px">${t}</span>`).join('')}
          ${c.location ? `<span class="text-[10px] text-zinc-500">· ${c.location}</span>`:''}
          ${c.comments.length ? `<span class="text-[10px] text-zinc-500">· 💬 ${c.comments.length}</span>`:''}
        </div>
      </div>
      <div class="w-40 shrink-0 hidden sm:block">
        ${m ? `
          <div class="h-1.5 rounded-full bg-ink-800 overflow-hidden">
            <div class="momentum h-full rounded-full transition-all" style="width:${m.pct}%; --c1:${m.c1}; --c2:${m.c2}"></div>
          </div>
          <div class="text-[10px] mt-1 ${m.risk==='cold'?'text-red-400':m.risk==='cool'?'text-orange-400':'text-zinc-500'}">${m.label}</div>
        ` : `<div class="text-[10px] text-zinc-600 text-right">—</div>`}
      </div>
      <svg class="w-4 h-4 text-zinc-600 group-hover:text-zinc-300 transition shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </div>`;
}

// ── ACTIONS ─────────────────────────────────────────────────────────────────
function setStatus(s){ filter.status = s; render(); }
function setQ(v){ filter.q = v; render(); }
function cycleStatus(id){
  const c = state.find(x=>x.id===id);
  c.status = ORDER[(ORDER.indexOf(c.status)+1)%ORDER.length];
  c.last = now(); save(); render();
  toast(`${c.company} → ${STATUSES[c.status].label}`);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = `<div class="glass border border-ink-600 rounded-xl px-4 py-2.5 text-sm shadow-2xl animate-fadein">${msg}</div>`;
  clearTimeout(window._tt); window._tt = setTimeout(()=> t.innerHTML='', 2600);
}

// ── SLIDE-OVER PANEL ────────────────────────────────────────────────────────
function openPanel(id){
  const c = state.find(x=>x.id===id);
  const st = STATUSES[c.status];
  const root = document.getElementById('panel-root');
  root.innerHTML = `
    <div class="fixed inset-0 z-40 bg-black/50 animate-fadein" onclick="closePanel()"></div>
    <aside class="fixed top-0 right-0 z-40 h-full w-full max-w-md glass border-l border-ink-700 animate-slidein flex flex-col">
      <div class="flex items-start justify-between p-5 border-b border-ink-700/60">
        <div>
          <div class="text-xl font-bold text-zinc-100">${c.company}</div>
          <div class="text-zinc-400">${c.role}</div>
          <div class="flex items-center gap-2 mt-2 text-xs text-zinc-500">
            ${c.salary && c.salary!=='—' ? `<span>💰 ${c.salary}</span>`:''}
            ${c.location ? `<span>📍 ${c.location}</span>`:''}
            ${c.url ? `<a href="${c.url}" target="_blank" class="text-glow-soft hover:underline">🔗 offre</a>`:''}
          </div>
        </div>
        <button onclick="closePanel()" class="text-zinc-500 hover:text-zinc-200 p-1">✕</button>
      </div>

      <div class="flex-1 overflow-y-auto p-5 space-y-5">
        <!-- statut -->
        <div>
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Statut</label>
          <div class="flex flex-wrap gap-1.5 mt-2">
            ${ORDER.map(s=>`<button onclick="setCardStatus(${c.id},'${s}')" class="text-xs rounded-md px-2.5 py-1.5 border transition ${c.status===s?'border-ink-500 text-zinc-100':'border-ink-700 text-zinc-400 hover:text-zinc-200'}" style="${c.status===s?`background:${STATUSES[s].tint}`:''}"><span class="inline-block w-1.5 h-1.5 rounded-full mr-1.5 align-middle" style="background:${STATUSES[s].dot}"></span>${STATUSES[s].label}</button>`).join('')}
          </div>
        </div>

        <!-- IA inline -->
        <div class="rounded-xl border border-glow/25 bg-glow/[0.05] p-3">
          <div class="text-xs font-semibold text-glow-soft mb-2 flex items-center gap-1.5">🤖 Actions IA</div>
          <div class="flex flex-wrap gap-1.5">
            <button onclick="aiDraft(${c.id},'relance')" class="text-xs bg-ink-800 hover:bg-ink-700 border border-ink-600 rounded-md px-2.5 py-1.5">✉️ Rédiger une relance</button>
            <button onclick="aiDraft(${c.id},'prep')" class="text-xs bg-ink-800 hover:bg-ink-700 border border-ink-600 rounded-md px-2.5 py-1.5">🎯 Préparer l'entretien</button>
            <button onclick="aiDraft(${c.id},'resume')" class="text-xs bg-ink-800 hover:bg-ink-700 border border-ink-600 rounded-md px-2.5 py-1.5">📝 Résumer l'offre</button>
          </div>
          <div id="ai-out" class="mt-3 text-sm text-zinc-300 whitespace-pre-wrap leading-relaxed"></div>
        </div>

        <!-- commentaires -->
        <div>
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Journal · ${c.comments.length}</label>
          <div class="mt-2 space-y-2">
            ${c.comments.slice().reverse().map(cm=>`<div class="text-sm bg-ink-850 border border-ink-700/60 rounded-lg p-2.5"><div class="text-zinc-300">${cm.txt}</div><div class="text-[10px] text-zinc-600 mt-1">${rel(cm.t)}</div></div>`).join('') || `<div class="text-sm text-zinc-600">Rien pour l'instant.</div>`}
          </div>
          <div class="mt-2 flex gap-2">
            <input id="newcomment" placeholder="Ajouter une note…" onkeydown="if(event.key==='Enter')addComment(${c.id})"
              class="flex-1 bg-ink-850 border border-ink-700 rounded-lg px-3 h-9 text-sm focus:outline-none focus:ring-1 focus:ring-glow placeholder-zinc-600"/>
            <button onclick="addComment(${c.id})" class="bg-ink-700 hover:bg-ink-600 rounded-lg px-3 text-sm">↵</button>
          </div>
        </div>
      </div>
    </aside>`;
}
function closePanel(){ document.getElementById('panel-root').innerHTML=''; }
function setCardStatus(id,s){ const c=state.find(x=>x.id===id); c.status=s; c.last=now(); save(); openPanel(id); render(); toast(`${c.company} → ${STATUSES[s].label}`); }
function addComment(id){
  const inp=document.getElementById('newcomment'); const v=inp.value.trim(); if(!v)return;
  const c=state.find(x=>x.id===id); c.comments.push({t:now(), txt:v}); c.last=now(); save(); openPanel(id); render();
}

// ── SIMULATION IA (à remplacer par l'API Claude) ────────────────────────────
function aiDraft(id, kind){
  const c = state.find(x=>x.id===id);
  const out = document.getElementById('ai-out');
  out.innerHTML = `<span class="text-zinc-500 animate-pulseGlow">L'IA réfléchit…</span>`;
  // 🔌 CLAUDE : ici, POST /api/ai  { kind, card:c }  → renvoyer le texte généré.
  setTimeout(()=>{
    let txt = '';
    if (kind==='relance') txt = `Objet : Suivi de ma candidature — ${c.role}\n\nBonjour,\n\nJe me permets de revenir vers vous concernant le poste de ${c.role} chez ${c.company}. Toujours très motivé·e par ${c.stack?.[0]||'le poste'}, je reste disponible pour échanger.\n\nBien à vous,`;
    else if (kind==='prep') txt = `Questions probables — ${c.company} :\n• Parle d'un projet ${c.stack?.[0]||'technique'} dont tu es fier·e (méthode STAR).\n• Comment tu gères la dette technique ?\n• Pourquoi ${c.company} ?\n\n→ Prépare 2 exemples chiffrés.`;
    else txt = `${c.role} @ ${c.company}\nStack : ${(c.stack||[]).join(', ')}\nRému : ${c.salary} · ${c.location}\nRésumé : poste orienté ${c.stack?.[0]||'produit'}, bon fit avec ton profil.`;
    out.textContent = txt;
  }, 650);
}

// ── COLLER UNE OFFRE → auto-fill ────────────────────────────────────────────
function openPaste(){
  const root=document.getElementById('cmd-root');
  root.innerHTML=`
    <div class="fixed inset-0 z-50 bg-black/60 grid place-items-start justify-center pt-28 animate-fadein" onclick="if(event.target===this)closeCmd()">
      <div class="w-full max-w-xl glass border border-ink-600 rounded-2xl ring-glow p-5 animate-fadein">
        <div class="flex items-center gap-2 mb-3"><span class="text-glow-soft">📥</span><span class="font-semibold">Coller une offre</span><span class="text-xs text-zinc-500">— l'IA extrait les infos</span></div>
        <textarea id="paste" rows="6" placeholder="Colle l'URL ou tout le texte de l'offre ici…" class="w-full bg-ink-900 border border-ink-700 rounded-xl p-3 text-sm focus:outline-none focus:ring-1 focus:ring-glow placeholder-zinc-600"></textarea>
        <div class="flex justify-end gap-2 mt-3">
          <button onclick="closeCmd()" class="text-sm text-zinc-400 hover:text-zinc-200 px-3 h-9">Annuler</button>
          <button onclick="doExtract()" class="text-sm font-medium bg-glow hover:bg-glow-soft text-white rounded-lg px-4 h-9">✨ Extraire & créer</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('paste').focus(),50);
}
function doExtract(){
  const raw=document.getElementById('paste').value.trim(); if(!raw)return closeCmd();
  // 🔌 CLAUDE : POST /api/extract { raw } → { company, role, salary, stack, location }
  const guessed = aiExtract(raw);
  const id = Math.max(0,...state.map(c=>c.id))+1;
  state.unshift({ id, status:'wishlist', last:now(), next:null, comments:[], url: raw.startsWith('http')?raw.split(/\s/)[0]:'', ...guessed });
  save(); closeCmd(); render(); openPanel(id); toast(`✨ ${guessed.company} ajouté depuis l'offre`);
}
function aiExtract(raw){
  const low=raw.toLowerCase();
  const known=['Stripe','Datadog','Figma','Notion','Vercel','Google','Spotify','Airbnb','Doctolib','Qonto','Alan','Swile'];
  const company = known.find(k=>low.includes(k.toLowerCase())) || (raw.match(/chez\s+([A-Z][\w&-]+)/)?.[1]) || 'Entreprise';
  const roles=['Frontend Engineer','Fullstack Engineer','Backend Engineer','Product Engineer','Lead Developer','DevOps Engineer'];
  const role = roles.find(r=>low.includes(r.toLowerCase().split(' ')[0])) || 'Software Engineer';
  const stackPool=['React','TypeScript','Node','Next.js','Go','Python','Rust','GraphQL','K8s','AWS','Vue'];
  const stack=stackPool.filter(s=>low.includes(s.toLowerCase())).slice(0,4);
  const salary=(raw.match(/(\d{2,3})\s*[–\-àa]\s*(\d{2,3})\s*k/i)?.[0]) || '—';
  const location = low.includes('remote')?'Remote': low.includes('paris')?'Paris':'—';
  return { company, role, salary, stack: stack.length?stack:['—'], location };
}

// ── COMMAND BAR / COPILOTE (⌘K) ─────────────────────────────────────────────
function openCmd(){
  const root=document.getElementById('cmd-root');
  root.innerHTML=`
    <div class="fixed inset-0 z-50 bg-black/60 grid place-items-start justify-center pt-28 animate-fadein" onclick="if(event.target===this)closeCmd()">
      <div class="w-full max-w-xl glass border border-ink-600 rounded-2xl ring-glow overflow-hidden animate-fadein">
        <div class="flex items-center gap-3 px-4 h-14 border-b border-ink-700">
          <span class="text-glow-soft">🤖</span>
          <input id="cmd" placeholder="Demande au copilote ou tape une commande…" autocomplete="off"
            onkeydown="if(event.key==='Enter')runCmd(this.value)"
            class="flex-1 bg-transparent text-[15px] focus:outline-none placeholder-zinc-600"/>
          <kbd class="text-[10px] bg-ink-700 px-1.5 py-0.5 rounded border border-ink-600">esc</kbd>
        </div>
        <div id="cmd-body" class="max-h-80 overflow-y-auto p-2">
          ${cmdSuggestions()}
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('cmd').focus(),50);
}
function cmdSuggestions(){
  const ex=['Qui je dois relancer ?','Résume mon pipeline','Mes entretiens à venir','Candidatures bloquées'];
  return `<div class="text-[11px] text-zinc-500 px-2 py-1.5">Suggestions</div>` +
    ex.map(e=>`<button onclick="runCmd('${e}')" class="w-full text-left text-sm px-3 py-2 rounded-lg hover:bg-ink-800 flex items-center gap-2"><span class="text-zinc-600">›</span>${e}</button>`).join('');
}
function runCmd(q){
  q=(q||'').toLowerCase().trim(); if(!q)return;
  const body=document.getElementById('cmd-body');
  body.innerHTML=`<div class="p-4 text-sm text-zinc-500 animate-pulseGlow">Le copilote analyse tes ${state.length} candidatures…</div>`;
  // 🔌 CLAUDE : POST /api/copilot { q, cards: state } → réponse + éventuelles actions
  setTimeout(()=>{
    let html='';
    const stale=state.filter(c=>{const m=momentum(c);return m&&(m.risk==='cool'||m.risk==='cold');});
    const inter=state.filter(c=>c.status==='interview');
    if(q.includes('relanc')||q.includes('bloqu')){
      html = stale.length
        ? `<div class="px-3 py-2 text-sm text-zinc-300">À relancer (perte de momentum) :</div>`+stale.map(c=>cmdResult(c)).join('')
        : `<div class="p-4 text-sm text-zinc-400">✅ Rien à relancer, ton pipeline est frais.</div>`;
    } else if(q.includes('entretien')){
      html = inter.length ? inter.map(c=>cmdResult(c)).join('') : `<div class="p-4 text-sm text-zinc-400">Aucun entretien en cours.</div>`;
    } else if(q.includes('résum')||q.includes('resum')||q.includes('pipeline')){
      const by=ORDER.map(s=>`${state.filter(c=>c.status===s).length} ${STATUSES[s].label.toLowerCase()}`).join(' · ');
      html=`<div class="p-4 text-sm text-zinc-300 leading-relaxed">📊 <b>${state.length} candidatures</b> : ${by}.<br>🔥 ${stale.length} en perte de momentum à relancer.<br>📅 ${inter.length} entretien(s) en cours.</div>`;
    } else {
      html=`<div class="p-4 text-sm text-zinc-300">Je peux t'aider à : relancer, lister tes entretiens, résumer ton pipeline. <br><span class="text-zinc-500">(démo — branche l'API Claude pour des réponses libres)</span></div>`;
    }
    body.innerHTML=html;
  }, 600);
}
function cmdResult(c){
  return `<button onclick="closeCmd();openPanel(${c.id})" class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-ink-800 flex items-center gap-3">
    <span class="w-2 h-2 rounded-full" style="background:${STATUSES[c.status].dot}"></span>
    <span class="font-medium text-zinc-200">${c.company}</span><span class="text-zinc-500 text-sm">${c.role}</span>
    <span class="ml-auto text-[11px] ${momentum(c)?.risk==='cold'?'text-red-400':'text-orange-400'}">${momentum(c)?.label||''}</span>
  </button>`;
}
function closeCmd(){ document.getElementById('cmd-root').innerHTML=''; }

function rel(t){ const d=Math.floor((now()-t)/DAY); return d<=0?"aujourd'hui":d===1?'hier':`il y a ${d} j`; }

// ── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); openCmd(); }
  if(e.key==='Escape'){ closeCmd(); closePanel(); }
});

render();
</script>
